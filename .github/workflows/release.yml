name: Build and Release Burp Extension

# 触发条件：当你推送以 "v" 开头的标签（如 v1.0, v2.1）时，触发自动打包发布
on:
  push:
    tags:
      - 'v*'

# 赋予 Action 创建 Release 发布的权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest # 在最新的 Linux 云服务器上运行

    steps:
      - name: 1. 检出你的代码 (Checkout)
        uses: actions/checkout@v3

      - name: 2. 配置 Java 11 环境 (Set up JDK 11)
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven' # 自动缓存依赖，加快后续编译速度

      - name: 3. 执行 Maven 编译打包 (Build with Maven)
        run: mvn clean package

      - name: 4. 自动发布到 GitHub Releases 并上传 Jar 包 (Create Release)
        uses: softprops/action-gh-release@v1
        with:
          # 指向 Maven 编译后生成的 jar 包路径
          files: target/403Bypasser-1.0-SNAPSHOT.jar
        env:
          # 使用 GitHub 自动提供的 Token 进行鉴权
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}